name: Build ImmortalWrt x86

on:
  workflow_dispatch:
    inputs:
      enable_bandix:
        description: '启用 Bandix'
        required: false
        default: true
        type: boolean
      enable_lucky:
        description: '启用 Lucky'
        required: false
        default: true
        type: boolean
      enable_easytier:
        description: '启用 EasyTier'
        required: false
        default: true
        type: boolean
      enable_at_webserver:
        description: '启用 at-webserver'
        required: false
        default: true
        type: boolean
      enable_netspeedtest:
        description: '启用 NetSpeedTest'
        required: false
        default: true
        type: boolean
      enable_upnp:
        description: '启用 UPnP'
        required: false
        default: true
        type: boolean
      enable_dockerman:
        description: '启用 DockerMan'
        required: false
        default: true
        type: boolean
      enable_etherwake:
        description: '启用 EtherWake'
        required: false
        default: true
        type: boolean
      enable_daed:
        description: '启用 daed'
        required: false
        default: false
        type: boolean
      enable_openclash:
        description: '启用 OpenClash'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-24.10
  SOURCE_DIR: immortalwrt
  LAN_IP: 192.168.1.1
  OFFLINE_ARCH: x86_64
  TZ: Asia/Shanghai

jobs:
  build_firmware:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 深度清理磁盘空间
        run: |
          echo "🧹 执行深度清理以释放磁盘空间..."
          docker rmi $(docker images -q) 2>/dev/null || true
          docker system prune -f 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /etc/mysql /etc/php \
            /usr/local/share/boost /usr/share/swift /opt/hostedtoolcache /usr/local/.ghcup \
            /usr/local/graalvm /imagegeneration /usr/local/share /opt /var/cache/apt/archives/* \
            /etc/apt/sources.list.d/* 2>/dev/null || true
          sudo apt-get -y purge azure-cli* docker* ghc* zulu* hhvm* llvm* firefox* \
            google* dotnet* aspnetcore* powershell* openjdk* adoptopenjdk* mysql* php* \
            mongodb* moby* snap* 2>/dev/null || true
          sudo apt-get autoremove --purge -y && sudo apt-get clean && sudo apt-get autoclean
          sudo rm -rf /tmp/* /var/tmp/* /var/log/* ~/.cache/* 2>/dev/null || true
          df -h /

      - name: 安装编译依赖
        run: |
          echo "📦 安装编译依赖..."
          sudo apt-get update -qq
          sudo apt-get install -y jq curl wget unzip git npm
          curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh | sudo bash

          echo "🔧 配置 Rust 环境..."
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup target add x86_64-unknown-linux-musl || true
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

          export PATH="/usr/lib/ccache:$PATH"
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV
          ccache --set-config=max_size=2G
          ccache --version || true

      - name: 恢复编译缓存
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.SOURCE_DIR }}/dl
            ${{ env.SOURCE_DIR }}/staging_dir
            ~/.ccache
          key: ${{ runner.os }}-build-x86-${{ env.REPO_BRANCH }}-${{ hashFiles('x86.extra.config', '.github/workflows/build-x86.yml') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-build-x86-${{ env.REPO_BRANCH }}-${{ hashFiles('x86.extra.config', '.github/workflows/build-x86.yml') }}-
            ${{ runner.os }}-build-x86-${{ env.REPO_BRANCH }}-

      - name: 生成插件配置
        run: |
          echo "🔧 生成 x86 插件配置..."
          mkdir -p config

          normalize_bool() {
            case "$1" in
              true|True|TRUE|1|yes|Yes|YES) echo true ;;
              *) echo false ;;
            esac
          }

          ENABLE_BANDIX=$(normalize_bool "${{ inputs.enable_bandix }}")
          ENABLE_LUCKY=$(normalize_bool "${{ inputs.enable_lucky }}")
          ENABLE_EASYTIER=$(normalize_bool "${{ inputs.enable_easytier }}")
          ENABLE_AT_WEBSERVER=$(normalize_bool "${{ inputs.enable_at_webserver }}")
          ENABLE_NETSPEEDTEST=$(normalize_bool "${{ inputs.enable_netspeedtest }}")
          ENABLE_UPNP=$(normalize_bool "${{ inputs.enable_upnp }}")
          ENABLE_DOCKERMAN=$(normalize_bool "${{ inputs.enable_dockerman }}")
          ENABLE_ETHERWAKE=$(normalize_bool "${{ inputs.enable_etherwake }}")
          ENABLE_DAED=$(normalize_bool "${{ inputs.enable_daed }}")
          ENABLE_OPENCLASH=$(normalize_bool "${{ inputs.enable_openclash }}")

          if [ "$ENABLE_DAED" = "true" ] && [ "$ENABLE_OPENCLASH" = "true" ]; then
            echo "❌ daed 和 OpenClash 建议二选一，请关闭其中一个"
            exit 1
          fi

          jq -n \
            --argjson enable_bandix "$ENABLE_BANDIX" \
            --argjson enable_lucky "$ENABLE_LUCKY" \
            --argjson enable_easytier "$ENABLE_EASYTIER" \
            --argjson enable_at_webserver "$ENABLE_AT_WEBSERVER" \
            --argjson enable_netspeedtest "$ENABLE_NETSPEEDTEST" \
            --argjson enable_upnp "$ENABLE_UPNP" \
            --argjson enable_dockerman "$ENABLE_DOCKERMAN" \
            --argjson enable_etherwake "$ENABLE_ETHERWAKE" \
            --argjson enable_daed "$ENABLE_DAED" \
            --argjson enable_openclash "$ENABLE_OPENCLASH" \
            '{
              enable_bandix: $enable_bandix,
              enable_lucky: $enable_lucky,
              enable_easytier: $enable_easytier,
              enable_at_webserver: $enable_at_webserver,
              enable_netspeedtest: $enable_netspeedtest,
              enable_upnp: $enable_upnp,
              enable_dockerman: $enable_dockerman,
              enable_etherwake: $enable_etherwake,
              enable_daed: $enable_daed,
              enable_openclash: $enable_openclash
            }' > config/plugins.json

          cat config/plugins.json

      - name: 源码和 feeds 准备
        run: |
          echo "📥 克隆 ImmortalWrt $REPO_BRANCH..."
          rm -rf "$SOURCE_DIR"
          git clone -b "$REPO_BRANCH" --single-branch --depth=1 "$REPO_URL" "$SOURCE_DIR"
          cd "$SOURCE_DIR"

          cat > feeds.conf.default << EOF
          src-git packages https://github.com/immortalwrt/packages.git;$REPO_BRANCH
          src-git luci https://github.com/immortalwrt/luci.git;$REPO_BRANCH
          src-git routing https://github.com/openwrt/routing.git;$REPO_BRANCH
          src-git telephony https://github.com/openwrt/telephony.git;$REPO_BRANCH
          EOF

          echo "📋 feeds.conf.default:"
          cat feeds.conf.default

          rm -rf tmp/.config* tmp/.packageinfo tmp/.targetinfo tmp/info tmp/.feeds* 2>/dev/null || true
          ./scripts/feeds update -a -j "$(nproc)" || ./scripts/feeds update -a
          ./scripts/feeds install -a -f -j "$(nproc)" || ./scripts/feeds install -a -f

      - name: 克隆第三方源码包
        run: |
          cd "$SOURCE_DIR"
          CFG="$GITHUB_WORKSPACE/config/plugins.json"

          is_enabled() {
            [ "$(jq -r --arg key "$1" '.[$key] // false' "$CFG")" = "true" ]
          }

          if is_enabled enable_netspeedtest; then
            git clone --depth=1 -b main https://github.com/sirpdboy/netspeedtest.git package/netspeedtest
          fi

          if is_enabled enable_at_webserver; then
            git clone --depth=1 -b main https://github.com/shi-an/mt5700webui-openwrt-server.git package/luci-app-at-webserver
          fi

          if is_enabled enable_lucky; then
            git clone --depth=1 -b main https://github.com/gdy666/luci-app-lucky.git package/luci-app-lucky
          fi

          if is_enabled enable_daed; then
            git clone --depth=1 https://github.com/QiuSimons/luci-app-daed.git package/dae
            sudo npm install -g pnpm
          fi

      - name: 下载离线 IPK 包
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd "$SOURCE_DIR"
          CFG="$GITHUB_WORKSPACE/config/plugins.json"
          INSTALL_DIR="files/root/ipks"
          mkdir -p "$INSTALL_DIR" files/etc/uci-defaults

          is_enabled() {
            [ "$(jq -r --arg key "$1" '.[$key] // false' "$CFG")" = "true" ]
          }

          github_api() {
            if [ -n "${GH_TOKEN:-}" ]; then
              curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "$1"
            else
              curl -fsSL -H "Accept: application/vnd.github+json" "$1"
            fi
          }

          download_to_ipks() {
            local url="$1"
            [ -n "$url" ] && [ "$url" != "null" ] || return 1
            echo "📥 $url"
            wget -q -P "$INSTALL_DIR" "$url"
          }

          if is_enabled enable_easytier; then
            ET_URL=$(github_api https://api.github.com/repos/EasyTier/luci-app-easytier/releases/latest | jq -r \
              --arg arch "$OFFLINE_ARCH" \
              '.assets[] | select(.name | contains($arch) and contains("22.03.7") and endswith(".zip") and (contains("SNAPSHOT") | not)) | .browser_download_url' | head -1)
            [ -n "$ET_URL" ] && [ "$ET_URL" != "null" ] || {
              ET_URL=$(github_api https://api.github.com/repos/EasyTier/luci-app-easytier/releases/latest | jq -r \
                --arg arch "$OFFLINE_ARCH" \
                '.assets[] | select(.name | contains($arch) and endswith(".zip") and (contains("SNAPSHOT") | not)) | .browser_download_url' | head -1)
            }
            [ -n "$ET_URL" ] && [ "$ET_URL" != "null" ] || { echo "❌ 未找到 EasyTier $OFFLINE_ARCH IPK 包"; exit 1; }
            wget -qO /tmp/easytier.zip "$ET_URL"
            unzip -o /tmp/easytier.zip -d "$INSTALL_DIR"
            ls "$INSTALL_DIR"/easytier*.ipk >/dev/null || { echo "❌ EasyTier 解压后未找到 IPK"; exit 1; }
          fi

          if is_enabled enable_bandix; then
            BD_CORE_URL=$(github_api https://api.github.com/repos/timsaya/openwrt-bandix/releases/latest | jq -r \
              --arg arch "$OFFLINE_ARCH" \
              '.assets[] | select(.name | test("^bandix_.*" + $arch + "\\.ipk$")) | .browser_download_url' | head -1)
            BD_LUCI_URL=$(github_api https://api.github.com/repos/timsaya/luci-app-bandix/releases/latest | jq -r \
              '.assets[] | select(.name | test("^luci-app-bandix_.*_all\\.ipk$")) | .browser_download_url' | head -1)
            BD_I18N_URL=$(github_api https://api.github.com/repos/timsaya/luci-app-bandix/releases/latest | jq -r \
              '.assets[] | select(.name | test("^luci-i18n-bandix-zh-cn_.*_all\\.ipk$")) | .browser_download_url' | head -1)

            download_to_ipks "$BD_CORE_URL" || { echo "❌ 未找到 Bandix $OFFLINE_ARCH 核心 IPK"; exit 1; }
            download_to_ipks "$BD_LUCI_URL" || { echo "❌ 未找到 Bandix LuCI IPK"; exit 1; }
            download_to_ipks "$BD_I18N_URL" || { echo "❌ 未找到 Bandix 中文 IPK"; exit 1; }
          fi

          cat > files/etc/uci-defaults/99-install-custom-ipks << 'EOF'
          #!/bin/sh
          if [ -d "/root/ipks" ] && command -v opkg >/dev/null 2>&1; then
            for pattern in /root/ipks/easytier*.ipk /root/ipks/bandix*.ipk /root/ipks/luci-app-*.ipk /root/ipks/luci-i18n-*.ipk; do
              for pkg in $pattern; do
                [ -e "$pkg" ] && opkg install "$pkg" || true
              done
            done
            rm -rf /root/ipks
          fi
          exit 0
          EOF
          chmod +x files/etc/uci-defaults/99-install-custom-ipks

      - name: 修复依赖并预置 OpenClash 核心
        run: |
          cd "$SOURCE_DIR"
          CFG="$GITHUB_WORKSPACE/config/plugins.json"

          sed -i 's/find $targetdir\/ '\''('\'' -name '\''\*.orig'\'' -o -name '\''.\*.orig'\'' '\'')'\'' -exec rm -f {} \\;/echo "Skipping remove .orig files"/' scripts/patch-kernel.sh || true
          rm -rf package/feeds/packages/{exim,onionshare-cli,python-zope-event,python-zope-interface,python-gevent,python-twisted} 2>/dev/null || true

          EBTABLES_MAKEFILE="package/network/utils/ebtables/Makefile"
          if [ -f "$EBTABLES_MAKEFILE" ]; then
            sed -i 's|https://git.netfilter.org/ebtables|https://github.com/netfilter/ebtables.git|g' "$EBTABLES_MAKEFILE"
            sed -i 's|git://git.netfilter.org/ebtables|https://github.com/netfilter/ebtables.git|g' "$EBTABLES_MAKEFILE"
            sed -i 's|PKG_MIRROR_HASH:=.*|PKG_MIRROR_HASH:=skip|g' "$EBTABLES_MAKEFILE"
          fi

          if [ "$(jq -r '.enable_openclash // false' "$CFG")" = "true" ]; then
            OC_DIR="feeds/luci/applications/luci-app-openclash"
            [ -d "$OC_DIR" ] || { echo "❌ 未找到 luci-app-openclash"; exit 1; }
            mkdir -p "$OC_DIR/root/etc/openclash/core"
            core_path="$OC_DIR/root/etc/openclash/core"
            geo_path="$OC_DIR/root/etc/openclash"
            wget -qO- https://raw.githubusercontent.com/vernesong/OpenClash/core/master/meta/clash-linux-amd64.tar.gz | tar xOvz > "$core_path/clash_meta"
            wget -qO "$geo_path/GeoIP.dat" https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
            wget -qO "$geo_path/GeoSite.dat" https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat
            chmod +x "$core_path/clash_meta"
          fi

      - name: 修改默认 LAN IP
        run: |
          cd "$SOURCE_DIR"
          echo "🔧 修改默认 LAN IP 为 $LAN_IP"
          sed -i -E "s/192\\.168\\.[0-9]+\\.1/$LAN_IP/g" package/base-files/files/bin/config_generate

      - name: 配置构建
        run: |
          cd "$SOURCE_DIR"
          CFG="$GITHUB_WORKSPACE/config/plugins.json"

          is_enabled() {
            [ "$(jq -r --arg key "$1" '.[$key] // false' "$CFG")" = "true" ]
          }

          disable_package() {
            local pkg="$1"
            sed -i "/^CONFIG_PACKAGE_${pkg}=/d; /^# CONFIG_PACKAGE_${pkg} is not set/d" .config
            echo "# CONFIG_PACKAGE_${pkg} is not set" >> .config
          }

          verify_enabled_pkg() {
            local feature_name="$1"
            local config_name="$2"
            local enabled_key="$3"
            if is_enabled "$enabled_key" && ! grep -q "^CONFIG_PACKAGE_${config_name}=y$" .config; then
              echo "❌ ${feature_name} 已启用，但 make defconfig 后 CONFIG_PACKAGE_${config_name}=y 未生效"
              grep -n "PACKAGE_${config_name}" .config || true
              exit 1
            fi
          }

          cp "$GITHUB_WORKSPACE/x86.extra.config" .config

          if is_enabled enable_bandix; then
            echo "CONFIG_PACKAGE_zoneinfo-all=y" >> .config
            echo "CONFIG_PACKAGE_libnetfilter-queue1=y" >> .config
            echo "CONFIG_PACKAGE_libnetfilter-cttimeout1=y" >> .config
            echo "CONFIG_PACKAGE_libnetfilter-cthelper0=y" >> .config
            echo "CONFIG_PACKAGE_conntrack=y" >> .config
            echo "CONFIG_PACKAGE_kmod-tun=y" >> .config
            echo "CONFIG_PACKAGE_libstdcpp=y" >> .config
            echo "CONFIG_PACKAGE_libpthread=y" >> .config
            echo "CONFIG_PACKAGE_librt=y" >> .config
          fi

          if is_enabled enable_easytier; then
            echo "CONFIG_PACKAGE_kmod-tun=y" >> .config
            echo "CONFIG_PACKAGE_libstdcpp=y" >> .config
            echo "CONFIG_PACKAGE_libpthread=y" >> .config
            echo "CONFIG_PACKAGE_librt=y" >> .config
          fi

          if is_enabled enable_lucky; then
            echo "CONFIG_PACKAGE_luci-app-lucky=y" >> .config
            echo "CONFIG_PACKAGE_luci-i18n-lucky-zh-cn=y" >> .config
          fi

          if is_enabled enable_at_webserver; then
            echo "CONFIG_PACKAGE_at-webserver=y" >> .config
            echo "CONFIG_PACKAGE_luci-app-at-webserver=y" >> .config
            echo "CONFIG_PACKAGE_luci-i18n-at-webserver-zh-cn=y" >> .config
          fi

          if is_enabled enable_netspeedtest; then
            echo "CONFIG_PACKAGE_luci-app-netspeedtest=y" >> .config
            echo "CONFIG_PACKAGE_luci-i18n-netspeedtest-zh-cn=y" >> .config
          fi

          if is_enabled enable_upnp; then
            echo "CONFIG_PACKAGE_luci-app-upnp=y" >> .config
            echo "CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y" >> .config
          fi

          if is_enabled enable_dockerman; then
            echo "CONFIG_PACKAGE_luci-app-dockerman=y" >> .config
            echo "CONFIG_PACKAGE_luci-lib-docker=y" >> .config
            echo "CONFIG_PACKAGE_docker=y" >> .config
            echo "CONFIG_PACKAGE_dockerd=y" >> .config
            echo "CONFIG_PACKAGE_containerd=y" >> .config
            echo "CONFIG_PACKAGE_runc=y" >> .config
          fi

          if is_enabled enable_etherwake; then
            echo "CONFIG_PACKAGE_luci-app-wol=y" >> .config
            echo "CONFIG_PACKAGE_luci-i18n-wol-zh-cn=y" >> .config
            echo "CONFIG_PACKAGE_etherwake=y" >> .config
          fi

          if is_enabled enable_daed; then
            echo "CONFIG_PACKAGE_luci-app-daed=y" >> .config
            echo "CONFIG_PACKAGE_luci-i18n-daed-zh-cn=y" >> .config
            echo "CONFIG_KERNEL_DEBUG_INFO=y" >> .config
            echo "CONFIG_KERNEL_DEBUG_INFO_REDUCED=n" >> .config
            echo "CONFIG_KERNEL_DEBUG_INFO_BTF=y" >> .config
            echo "CONFIG_KERNEL_CGROUPS=y" >> .config
            echo "CONFIG_KERNEL_CGROUP_BPF=y" >> .config
            echo "CONFIG_KERNEL_BPF_EVENTS=y" >> .config
            echo "CONFIG_BPF_TOOLCHAIN_HOST=y" >> .config
            echo "CONFIG_KERNEL_XDP_SOCKETS=y" >> .config
            echo "CONFIG_PACKAGE_kmod-xdp-sockets-diag=y" >> .config
            echo "CONFIG_PACKAGE_kmod-sched-bpf=y" >> .config
            echo "CONFIG_KERNEL_BPF=y" >> .config
            echo "CONFIG_KERNEL_BPF_SYSCALL=y" >> .config
            echo "CONFIG_KERNEL_BPF_JIT=y" >> .config
            echo "CONFIG_KERNEL_KPROBES=y" >> .config
            echo "CONFIG_KERNEL_NET_INGRESS=y" >> .config
            echo "CONFIG_KERNEL_NET_EGRESS=y" >> .config
            echo "CONFIG_KERNEL_NET_SCH_INGRESS=m" >> .config
            echo "CONFIG_KERNEL_NET_CLS_BPF=m" >> .config
            echo "CONFIG_KERNEL_NET_CLS_ACT=y" >> .config
            echo "CONFIG_KERNEL_BPF_STREAM_PARSER=y" >> .config
            echo "CONFIG_KERNEL_KPROBE_EVENTS=y" >> .config
          fi

          if is_enabled enable_openclash; then
            echo "CONFIG_PACKAGE_luci-app-openclash=y" >> .config
          fi

          is_enabled enable_lucky || disable_package "luci-app-lucky"
          is_enabled enable_at_webserver || disable_package "luci-app-at-webserver"
          is_enabled enable_netspeedtest || disable_package "luci-app-netspeedtest"
          is_enabled enable_upnp || disable_package "luci-app-upnp"
          if ! is_enabled enable_dockerman; then
            for pkg in luci-app-dockerman luci-lib-docker docker dockerd containerd runc; do
              disable_package "$pkg"
            done
          fi
          if ! is_enabled enable_etherwake; then
            for pkg in luci-app-wol etherwake; do
              disable_package "$pkg"
            done
          fi
          is_enabled enable_daed || disable_package "luci-app-daed"
          is_enabled enable_openclash || disable_package "luci-app-openclash"

          make defconfig

          verify_enabled_pkg "Lucky" "luci-app-lucky" "enable_lucky"
          verify_enabled_pkg "AT WebServer" "luci-app-at-webserver" "enable_at_webserver"
          verify_enabled_pkg "NetSpeedTest" "luci-app-netspeedtest" "enable_netspeedtest"
          verify_enabled_pkg "UPnP" "luci-app-upnp" "enable_upnp"
          verify_enabled_pkg "DockerMan" "luci-app-dockerman" "enable_dockerman"
          verify_enabled_pkg "EtherWake" "luci-app-wol" "enable_etherwake"
          verify_enabled_pkg "Daed" "luci-app-daed" "enable_daed"
          verify_enabled_pkg "OpenClash" "luci-app-openclash" "enable_openclash"

          cp .config "$GITHUB_WORKSPACE/config/x86.config"
          echo "✅ x86 配置完成"

      - name: 上传构建配置 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-configs-x86
          path: config/
          retention-days: 7

      - name: 编译固件
        run: |
          cd "$SOURCE_DIR"
          THREADS=$(nproc)
          export PATH="/usr/lib/ccache:$PATH"

          echo "📥 下载构建依赖..."
          find dl -size -1024c -delete 2>/dev/null || true
          make download -j"$THREADS" V=s || { find dl -size -1024c -delete 2>/dev/null || true; make download -j1 V=s; }

          echo "🔨 开始编译 x86 固件 (${THREADS} 线程)..."
          if make -j"$THREADS" IGNORE_ERRORS=n; then
            echo "✅ 编译成功"
          else
            echo "⚠️ 并行编译失败，尝试单线程调试..."
            make -j1 V=s
          fi

      - name: 打包产物
        run: |
          cd "$SOURCE_DIR"
          mkdir -p ../artifacts
          find bin/targets/x86/64 -type f \( -name "*combined*.img.gz" -o -name "*.manifest" -o -name "sha256sums" \) -exec cp {} ../artifacts/ \;
          cd ..

          if [ -z "$(find artifacts -type f -name '*combined*.img.gz' -print -quit)" ]; then
            echo "❌ 未找到 x86 combined 镜像"
            find artifacts -maxdepth 1 -type f -print || true
            exit 1
          fi

          tar -czf artifacts.tar.gz artifacts/
          ls -lh artifacts/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-x86-${{ github.run_number }}
          path: artifacts.tar.gz
          retention-days: 30

  release:
    needs: build_firmware
    runs-on: ubuntu-22.04
    if: success()
    steps:
      - name: 下载构建配置
        uses: actions/download-artifact@v4
        with:
          name: build-configs-x86
          path: config

      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: artifacts-x86-${{ github.run_number }}

      - name: 解压产物
        run: |
          tar -xzf artifacts.tar.gz

      - name: 生成 Release 信息
        run: |
          if [ -z "$(ls -A artifacts/ 2>/dev/null)" ]; then
            echo "❌ 没有找到产物文件"
            exit 1
          fi

          echo "🎉 **ImmortalWrt x86 固件已构建完成**" > artifacts/release_body.md
          echo "" >> artifacts/release_body.md
          echo "📅 时间: $(date '+%Y-%m-%d %H:%M:%S')" >> artifacts/release_body.md
          echo "🔗 运行 ID: ${{ github.run_id }}" >> artifacts/release_body.md
          echo "🏷️ 分支: ${{ env.REPO_BRANCH }}" >> artifacts/release_body.md
          echo "🌐 默认 LAN IP: ${{ env.LAN_IP }}" >> artifacts/release_body.md
          echo "" >> artifacts/release_body.md
          echo "**⚙️ 启用的功能:**" >> artifacts/release_body.md

          jq -r 'to_entries | map(select(.key | startswith("enable_")) | select(.value == true) | .key | sub("^enable_"; "")) | .[]' config/plugins.json | awk '
            {
              key=$0;
              if (key=="bandix") name="Bandix";
              else if (key=="lucky") name="Lucky";
              else if (key=="easytier") name="EasyTier";
              else if (key=="at_webserver") name="AT WebServer";
              else if (key=="netspeedtest") name="NetSpeedTest";
              else if (key=="upnp") name="UPnP";
              else if (key=="dockerman") name="DockerMan";
              else if (key=="etherwake") name="EtherWake";
              else if (key=="daed") name="Daed";
              else if (key=="openclash") name="OpenClash";
              else { name=key; gsub(/_/, " ", name); }
              print "- ✅ " name;
            }
          ' >> artifacts/release_body.md

          cat > artifacts/MANIFEST.txt << EOF
          ╔════════════════════════════════════════════════╗
          ║    ImmortalWrt x86 固件构建信息                ║
          ╚════════════════════════════════════════════════╝

          📅 构建时间: $(date '+%Y-%m-%d %H:%M:%S')
          🔗 运行 ID: ${{ github.run_id }}
          🏷️  Build #: ${{ github.run_number }}
          🧱 源码分支: ${{ env.REPO_BRANCH }}
          🌐 默认 LAN IP: ${{ env.LAN_IP }}
          💽 目标设备: x86/64 generic

          📦 产物文件:
          EOF

          cd artifacts
          ls -lh | grep -v "^total" | awk '{print "  • " $9 " (" $5 ")"}' >> MANIFEST.txt

      - name: 上传构建结果
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-x86-${{ github.run_number }}
          path: artifacts/
          retention-days: 30

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: x86-${{ github.run_number }}
          name: ImmortalWrt x86
          body_path: artifacts/release_body.md
          files: |
            artifacts/*.img.gz
            artifacts/*.manifest
            artifacts/sha256sums
            artifacts/MANIFEST.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
